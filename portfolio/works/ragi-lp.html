<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cafe RAGI | 凪を味わう、一皿の呼吸。</title>
    <style>
        :root {
            --ragi-bg: #F7F3ED;
            --ragi-terracotta: #A64B2A;
            --ragi-moss: #586940;
            --ragi-gold: #D4AF37;
            --ragi-text: #3C2F2F;
        }
        body { margin: 0; font-family: "Shippori Mincho", serif; background: var(--ragi-bg); color: var(--ragi-text); line-height: 1.8; }
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('images/ragi-hero.jpg') center/cover; }
        .hero-content h1 { font-size: 3.5rem; letter-spacing: 0.5em; color: var(--ragi-bg); text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .concept { padding: 120px 20px; text-align: center; max-width: 800px; margin: 0 auto; }
        .concept h2 { color: var(--ragi-terracotta); font-size: 1.2rem; letter-spacing: 0.3em; margin-bottom: 40px; }
        .concept p { font-size: 1.1rem; letter-spacing: 0.1em; }
        .border-gold { width: 60px; height: 1px; background: var(--ragi-gold); margin: 30px auto; }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <h1>Cafe RAGI</h1>
            <p style="color: white; letter-spacing: 0.2em;">凪を味わう、一皿の呼吸。</p>
        </div>
    </section>
    <section class="concept">
        <h2>CONCEPT</h2>
        <div class="border-gold"></div>
        <p>鹿児島の豊かな土壌で育った生命力あふれる野菜と、<br>神社に流れるような静謐な空気感。<br><br>
        「静」と「動」が溶け合う場所、Cafe RAGI。<br>一口ごとに、心の中に穏やかな凪が訪れます。</p>
    </section>
</body>
</html>
