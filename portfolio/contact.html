<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT | MIKORAGI - 想いに光を当てる。</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="contact-page">

  <header>
    <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">MIKORAGI</a></div>
    <nav>
      <ul>
        <li><a href="works/index.html">WORKS</a></li>
        <li><a href="about.html">ABOUT</a></li>
        <li><a href="contact.html">CONTACT</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="contact-hero">
      <div class="container">
        <span class="section-label">CONTACT</span>
        <h1 class="main-title">想いをお聞かせください。</h1>
        <p class="contact-lead">
          Web制作のご相談、お見積りのご依頼、またはMIKORAGIへのご質問など、<br>
          以下のフォームよりお気軽にご連絡ください。24時間以内にご返信いたします。
        </p>
      </div>
    </section>

    <section class="contact-form-section section">
      <div class="container">
        <form action="#" method="post" class="contact-form">
          
          <div class="form-group">
            <label for="name">NAME <span>/ お名前</span></label>
            <input type="text" id="name" name="name" placeholder="例：中村 夢美" required>
          </div>

          <div class="form-group">
            <label for="email">E-MAIL <span>/ メールアドレス</span></label>
            <input type="email" id="email" name="email" placeholder="example@mail.com" required>
          </div>

          <div class="form-group">
            <label for="subject">SUBJECT <span>/ お問い合わせ項目</span></label>
            <select id="subject" name="subject">
              <option value="">選択してください</option>
              <option value="web-design">Webサイト制作について</option>
              <option value="branding">ブランディングのご相談</option>
              <option value="other">その他</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">MESSAGE <span>/ メッセージ内容</span></label>
            <textarea id="message" name="message" rows="8" placeholder="ご相談内容を自由にご記入ください" required></textarea>
          </div>

          <div class="form-submit">
            <button type="submit" class="submit-btn">SEND MESSAGE</button>
          </div>

        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <p class="f-brand">MIKORAGI</p>
      <p class="f-copy">&copy; 2026 MIKORAGI. All Rights Reserved.</p>
    </div>
  </footer>

</body>
</html>
